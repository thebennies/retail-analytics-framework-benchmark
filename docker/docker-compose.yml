networks:
  bench:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: bench-postgres
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-benchmark}
      POSTGRES_USER: ${POSTGRES_USER:-bench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bench}
    volumes:
      - ../database/pgdata:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d:ro
      - ../database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks: [bench]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-bench}", "-d", "${POSTGRES_DB:-benchmark}"]
      interval: 3s
      timeout: 3s
      retries: 20

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: bench-pgbouncer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-benchmark}
      DB_USER: ${POSTGRES_USER:-bench}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bench}
      POOL_MODE: ${PGBOUNCER_POOL_MODE:-transaction}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-100}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-15000}
      LISTEN_PORT: 5432
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    networks: [bench]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 3s
      timeout: 3s
      retries: 20

  fastapi:
    build:
      context: ../services/fastapi-app
      dockerfile: Dockerfile
    container_name: bench-fastapi
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bench}:${POSTGRES_PASSWORD:-bench}@pgbouncer:5432/${POSTGRES_DB:-benchmark}
      FASTAPI_PORT: ${FASTAPI_PORT:-8001}
    ports:
      - "${FASTAPI_PORT:-8001}:8001"
    networks: [bench]
    depends_on:
      pgbouncer:
        condition: service_healthy
    profiles: [fastapi]

  axum:
    build:
      context: ../services/axum-app
      dockerfile: Dockerfile
    container_name: bench-axum
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bench}:${POSTGRES_PASSWORD:-bench}@pgbouncer:5432/${POSTGRES_DB:-benchmark}
      QUERIES_PATH: /app/shared-queries.sql
      AXUM_PORT: 8003
      POOL_MAX: 100
      SERVICE_WORKERS: 4
      RUST_LOG: info
    ports:
      - "${AXUM_PORT:-8003}:8003"
    networks: [bench]
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health"]
      interval: 3s
      timeout: 3s
      retries: 20
    profiles: [axum]

  fastify:
    build:
      context: ../services/fastify-app
      dockerfile: Dockerfile
    container_name: bench-fastify
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bench}:${POSTGRES_PASSWORD:-bench}@pgbouncer:5432/${POSTGRES_DB:-benchmark}
      QUERIES_PATH: /app/shared-queries.sql
      FASTIFY_PORT: 8002
      POOL_MAX: 25
      POOL_MIN: 5
      SERVICE_WORKERS: 4
    ports:
      - "${FASTIFY_PORT:-8002}:8002"
    networks: [bench]
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 3s
      timeout: 3s
      retries: 20
    profiles: [fastify]

  generator:
    build:
      context: ../generator
    container_name: bench-generator
    environment:
      GENERATOR_DSN: postgresql://${POSTGRES_USER:-bench}:${POSTGRES_PASSWORD:-bench}@postgres:5432/${POSTGRES_DB:-benchmark}
    networks: [bench]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [generator]
